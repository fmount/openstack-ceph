parameters:
  nodes: 1
  pool: default
  network: default
  domain: devstack.local
  prefix: devstack
  numcpus: 4
  memory: 16384
  disk: 50
  osd_disk: 20
  image: ubuntunoble
  notify: false
  admin_password: iamgroot
  ceph_release: reef

{% for number in range(0, nodes) %}
{{ prefix }}-node-0{{ number }}:
 image: {{ image }}
 numcpus: {{ numcpus }}
 memory: {{ memory }}
 reservedns: true
 sharedkey: true
 domain: {{ domain }}
 nets:
  - {{ network }}
 disks:
   - size: {{ disk }}
   - size: {{ osd_disk }}
   - size: {{ osd_disk }}
 pool: {{ pool }}
 cmds:
 - echo 'root:{{ admin_password }}' | chpasswd
 - hostnamectl set-hostname {{ prefix }}-node-0{{ number }}
 - hostnamectl set-hostname --transient {{ prefix }}-node-0{{ number }}
 scripts:
  - bootstrap.sh
{% endfor %}
