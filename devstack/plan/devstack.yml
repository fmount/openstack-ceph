parameters:
  nodes: 1
  pool: default
  network: default
  domain: devstack.local
  prefix: devstack
  numcpus: 4
  memory: 16384
  disk: 50
  osd_disk: 20
  image: ubuntu2404
  notify: false
  ssh_key: ~/.ssh/id_rsa.pub

{% for number in range(0, nodes) %}
{{ prefix }}-node-0{{ number }}:
 image: {{ image }}
 numcpus: {{ numcpus }}
 memory: {{ memory }}
 reservedns: true
 sharedkey: true
 domain: {{ domain }}
 keys:
  - {{ ssh_key }}
 nets:
  - {{ network }}
 disks:
   - size: {{ disk }}
   - size: {{ osd_disk }}
   - size: {{ osd_disk }}
 pool: {{ pool }}
 files:
  - path: /etc/sudoers.d/stack
    content: "stack ALL=(ALL) NOPASSWD: ALL"
    mode: "0440"
 cmds:
 - useradd -s /bin/bash -d /opt/stack -m stack || true
 - chmod +x /opt/stack
 - hostnamectl set-hostname {{ prefix }}-node-0{{ number }}
 - hostnamectl set-hostname --transient {{ prefix }}-node-0{{ number }}
 scripts:
  - bootstrap.sh
{% endfor %}
